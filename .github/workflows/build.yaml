name: Auto Stage
on:
  push:
    branches: 
    - "main"
jobs:
  stage:
     runs-on: 
       labels: victor-vm-kube-master
     steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      - name: Set up Node.js (example)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install deps
        run: npm install
      - name: Run tests
        run: npm test
      - name: Build project
        run: npm run build
